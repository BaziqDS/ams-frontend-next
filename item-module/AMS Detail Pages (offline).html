  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

--surface: #F7F7F4;\n  --surface-2: #F1F1EC;\n  --card: #FFFFFF;\n  --overlay: rgba(14, 17, 22, 0.56);\n\n  /* Ink */\n  --ink: #0E1116;\n  --ink-2: #2A2F3A;\n  --muted: #5B6372;\n  --muted-2: #8B92A0;\n  --hairline: #E7E6E1;\n  --border: #E0DED8;\n  --border-strong: #CCCAC3;\n\n  /* Primary (institutional deep indigo-navy) */\n  --primary: oklch(0.42 0.09 255);\n  --primary-ink: #ffffff;\n  --primary-weak: oklch(0.96 0.015 255);\n  --primary-weak-border: oklch(0.88 0.03 255);\n\n  /* Semantic */\n  --success: oklch(0.55 0.11 155);\n  --success-weak: oklch(0.96 0.035 155);\n  --warn: oklch(0.68 0.15 75);\n  --warn-weak: oklch(0.96 0.04 75);\n  --danger: oklch(0.55 0.18 25);\n  --danger-weak: oklch(0.96 0.035 25);\n\n  /* Tier colors for power_level */\n  --tier-0: oklch(0.45 0.12 290); /* Global admin — violet-indigo */\n  --tier-1: oklch(0.42 0.09 255); /* Departmental — primary navy */\n  --tier-3: oklch(0.55 0.05 80);  /* Personal — warm neutral */\n\n  /* Type */\n  --font-sans: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-display: 'Instrument Serif', Georgia, serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Shape */\n  --radius-sm: 4px;\n  --radius: 6px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n\n  /* Density — row heights */\n  --row-h: 48px;\n\n  /* Shadow */\n  --shadow-xs: 0 1px 0 rgba(14, 17, 22, 0.04);\n  --shadow-sm: 0 1px 2px rgba(14, 17, 22, 0.06), 0 0 0 0.5px rgba(14, 17, 22, 0.04);\n  --shadow-md: 0 4px 12px -2px rgba(14, 17, 22, 0.08), 0 2px 4px -2px rgba(14, 17, 22, 0.06);\n  --shadow-lg: 0 24px 48px -12px rgba(14, 17, 22, 0.18), 0 8px 16px -8px rgba(14, 17, 22, 0.1);\n\n  /* Transitions */\n  --t-fast: 120ms cubic-bezier(0.2, 0, 0, 1);\n  --t: 200ms cubic-bezier(0.2, 0, 0, 1);\n}\n\n[data-density=\"compact\"] { --row-h: 36px; }\n[data-density=\"balanced\"] { --row-h: 48px; }\n[data-density=\"comfortable\"] { --row-h: 60px; }\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0;\n  padding: 0;\n  font-family: var(--font-sans);\n  font-feature-settings: 'ss01', 'cv11';\n  color: var(--ink);\n  background: var(--surface);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  letter-spacing: -0.005em;\n}\n\n/* ---------- Primitives ---------- */\n\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  height: 36px; padding: 0 14px;\n  border: 1px solid var(--border);\n  background: var(--card);\n  color: var(--ink);\n  border-radius: var(--radius);\n  font-family: inherit;\n  font-size: 13px;\n  font-weight: 500;\n  letter-spacing: -0.005em;\n  cursor: pointer;\n  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);\n  white-space: nowrap;\n}\n.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }\n.btn:active { transform: translateY(0.5px); }\n.btn-primary {\n  background: var(--primary);\n  border-color: var(--primary);\n  color: var(--primary-ink);\n}\n.btn-primary:hover { background: color-mix(in oklch, var(--primary) 90%, black); border-color: color-mix(in oklch, var(--primary) 90%, black); }\n.btn-ghost { border-color: transparent; background: transparent; }\n.btn-ghost:hover { background: var(--surface-2); }\n.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }\n.btn-xs { height: 24px; padding: 0 8px; font-size: 11.5px; gap: 6px; }\n.btn-icon { width: 32px; padding: 0; }\n.btn.icon-only,\n.row-action.icon-only {\n  width: 24px;\n  padding: 0;\n  justify-content: center;\n}\n.btn-danger-ghost { color: var(--danger); border-color: transparent; }\n.btn-danger-ghost:hover { background: var(--danger-weak); }\n\n.input {\n  display: block;\n  width: 100%;\n  height: 38px;\n  padding: 0 12px;\n  font-family: inherit;\n  font-size: 13.5px;\n  color: var(--ink);\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  outline: none;\n  transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);\n}\n.input::placeholder { color: var(--muted-2); }\n.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in oklch, var(--primary) 18%, transparent); }\n\n.field { display: flex; flex-direction: column; gap: 6px; }\n.field-label {\n  font-size: 11.5px;\n  font-weight: 500;\n  color: var(--ink-2);\n  letter-spacing: 0;\n}\n.field-hint { font-size: 11.5px; color: var(--muted); }\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: var(--muted);\n}\n\n/* ---------- Chips & Badges ---------- */\n\n.chip {\n  display: inline-flex; align-items: center; gap: 4px;\n  padding: 2px 8px;\n  border-radius: 999px;\n  font-size: 11.5px;\n  font-weight: 500;\n  background: var(--surface-2);\n  color: var(--ink-2);\n  border: 1px solid var(--hairline);\n  line-height: 18px;\n}\n.chip-loc {\n  background: var(--card);\n  color: var(--ink-2);\n  border: 1px solid var(--border);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0;\n  padding: 2px 7px;\n}\n\n.status-dot {\n  width: 6px; height: 6px; border-radius: 999px; display: inline-block;\n  background: var(--muted-2);\n}\n.status-dot.active { background: var(--success); box-shadow: 0 0 0 3px color-mix(in oklch, var(--success) 20%, transparent); }\n.status-dot.inactive { background: var(--muted-2); }\n\n.pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 9px;\n  border-radius: 999px;\n  font-size: 11.5px;\n  font-weight: 500;\n  line-height: 18px;\n}\n.pill-success { background: var(--success-weak); color: var(--success); }\n.pill-neutral { background: var(--surface-2); color: var(--muted); }\n.pill-danger { background: var(--danger-weak); color: var(--danger); }\n\n/* ---------- Layout ---------- */\n\n.app-frame {\n  display: flex;\n  min-height: 100vh;\n  width: 100%;\n}\n\n/* ---------- Scrollbar ---------- */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 2px solid var(--surface); }\n::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }\n\n/* ---------- Focus ring ---------- */\n:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 2px; }\n\n/* ---------- Kbd ---------- */\nkbd {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  padding: 2px 5px;\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-bottom-width: 2px;\n  border-radius: 4px;\n  color: var(--muted);\n  line-height: 1;\n}\n\n/* ---------- Scroll containers ---------- */\n.v-scroll { overflow-y: auto; }\n.h-scroll { overflow-x: auto; }\n\n/* ---------- Typography helpers ---------- */\n.display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }\n.mono { font-family: var(--font-mono); }\n\n/* ---------- Tweaks panel ---------- */\n.tweaks {\n  position: fixed;\n  bottom: 20px;\n  right: 20px;\n  width: 300px;\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-lg);\n  z-index: 1000;\n  overflow: hidden;\n  display: none;\n}\n.tweaks[data-open=\"true\"] { display: block; }\n.tweaks-header {\n  padding: 12px 14px;\n  border-bottom: 1px solid var(--hairline);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.tweaks-header h3 {\n  margin: 0;\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  color: var(--muted);\n  font-family: var(--font-mono);\n}\n.tweaks-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }\n.tweaks-row { display: flex; flex-direction: column; gap: 6px; }\n.tweaks-row label { font-size: 11.5px; color: var(--muted); }\n.tweaks-seg {\n  display: flex;\n  background: var(--surface-2);\n  border-radius: var(--radius);\n  padding: 2px;\n  gap: 2px;\n}\n.tweaks-seg button {\n  flex: 1;\n  background: transparent;\n  border: 0;\n  font-family: inherit;\n  font-size: 11.5px;\n  padding: 5px 8px;\n  border-radius: calc(var(--radius) - 2px);\n  color: var(--muted);\n  cursor: pointer;\n}\n.tweaks-seg button[data-active=\"true\"] {\n  background: var(--card);\n  color: var(--ink);\n  box-shadow: var(--shadow-xs);\n}\n.swatches { display: flex; gap: 6px; }\n.swatches button {\n  width: 26px; height: 26px; border-radius: 999px; border: 2px solid transparent; cursor: pointer; padding: 0;\n  outline: 1px solid var(--border);\n}\n.swatches button[data-active=\"true\"] { border-color: var(--ink); }\n\n/* ---------- Variation Tab Bar (prototype chrome) ---------- */\n.proto-chrome {\n  position: fixed;\n  top: 12px;\n  left: 50%;\n  transform: translateX(-50%);\n  display: flex;\n  background: rgba(255, 255, 255, 0.85);\n  backdrop-filter: blur(10px) saturate(180%);\n  -webkit-backdrop-filter: blur(10px) saturate(180%);\n  border: 1px solid var(--border);\n  border-radius: 999px;\n  padding: 4px;\n  z-index: 999;\n  box-shadow: var(--shadow-md);\n  gap: 2px;\n}\n.proto-chrome button {\n  background: transparent;\n  border: 0;\n  font-family: inherit;\n  font-size: 12px;\n  font-weight: 500;\n  padding: 6px 14px;\n  border-radius: 999px;\n  color: var(--muted);\n  cursor: pointer;\n  letter-spacing: -0.005em;\n  transition: color var(--t-fast), background var(--t-fast);\n}\n.proto-chrome button[data-active=\"true\"] {\n  background: var(--ink);\n  color: white;\n}\n.proto-chrome .sep {\n  width: 1px;\n  background: var(--border);\n  margin: 4px 2px;\n}\n/* ============================================================\n   NED AMS — Sidebar + Topbar styles\n   ============================================================ */\n\n.sidebar {\n  flex-shrink: 0;\n  width: 248px;\n  background: var(--card);\n  border-right: 1px solid var(--hairline);\n  display: flex;\n  flex-direction: column;\n  transition: width var(--t);\n  height: 100vh;\n  position: sticky;\n  top: 0;\n  z-index: 20;\n}\n.sidebar.collapsed { width: 68px; }\n\n.sb-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 18px 16px 16px 16px;\n  border-bottom: 1px solid var(--hairline);\n  min-height: 66px;\n}\n.sidebar.collapsed .sb-brand { padding: 18px 10px; justify-content: center; flex-direction: column; gap: 8px; }\n.sb-brand-mark {\n  width: 34px; height: 34px;\n  border-radius: 8px;\n  background: var(--surface-2);\n  border: 1px solid var(--hairline);\n  display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n  flex-shrink: 0;\n}\n.sb-brand-mark img { width: 100%; height: 100%; object-fit: contain; padding: 3px; }\n.sb-brand-copy { min-width: 0; flex: 1; }\n.sb-brand-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); line-height: 1.15; }\n.sb-brand-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }\n.sb-brand-toggle {\n  width: 32px;\n  height: 32px;\n  border-radius: var(--radius);\n  border: 1px solid transparent;\n  background: transparent;\n  color: var(--muted);\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  transition: color var(--t-fast), background var(--t-fast), border-color var(--t-fast);\n}\n.sb-brand-toggle:hover {\n  color: var(--ink);\n  background: var(--surface-2);\n  border-color: var(--hairline);\n}\n.sidebar.collapsed .sb-brand-toggle {\n  width: 36px;\n  height: 32px;\n}\n\n.sb-nav {\n  flex: 1;\n  padding: 10px 10px 8px 10px;\n  overflow-y: auto;\n}\n.sb-group { margin-bottom: 12px; }\n.sb-group-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--muted-2);\n  pad near-gradient(135deg, color-mix(in oklch, var(--primary) 90%, white), var(--primary));\n  color: white;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 11px; font-weight: 600;\n  letter-spacing: 0.01em;\n}\n.tb-user-text { line-height: 1.15; }\n.tb-user-name { font-size: 12.5px; font-weight: 550; color: var(--ink); }\n.tb-user-role { font-size: 11px; color: var(--muted); }\n\n/* ---------- Page wrapper ---------- */\n\n.page {\n  padding: 24px 28px 40px 28px;\n  max-width: 1680px;\n  width: 100%;\n}\n.page-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  margin-bottom: 20px;\n  gap: 20px;\n}\n.page-title-group h1 {\n  margin: 0;\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n.page-title-group h1.display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-size: 28px;\n  letter-spacing: -0.01em;\n}\n.page-title-group .page-sub {\n  margin-top: 4px;\n  font-size: 13px;\n  color: var(--muted);\n}\n.page-head-actions { display: flex; gap: 8px; align-items: center; }\n/* ============================================================\n   NED AMS — Login page styles\n   ============================================================ */\n\n/* ---------- Shared form bits ---------- */\n\n.input-wrap { position: relative; }\n.input.has-icon { padding-left: 36px; }\n.input.has-trail { padding-right: 38px; }\n.input-icon {\n  position: absolute;\n  left: 11px;\n  top: 50%;\n  transform: translateY(-50%);\n  color: var(--muted);\n  pointer-events: none;\n  display: flex;\n}\n.input-trail {\n  position: absolute;\n  right: 8px;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 26px; height: 26px;\n  border-radius: 4px;\n  background: transparent;\n  border: 0;\n  color: var(--muted);\n  cursor: pointer;\n  display: flex; align-items: center; justify-content: center;\n}\n.input-trail:hover { background: var(--surface-2); color: var(--ink); }\n\n.fiel --border);\n  border-radius: var(--radius-lg);\n  padding: 32px;\n  box-shadow: var(--shadow-lg);\n}\n.login-v1-card-head { margin-bottom: 24px; }\n.login-v1-card-head .eyebrow { margin-bottom: 8px; }\n.login-v1-card-head h1 {\n  margin: 0 0 6px;\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n}\n.login-v1-card-head p {\n  margin: 0;\n  font-size: 13px;\n  color: var(--muted);\n  line-height: 1.55;\n}\n.login-v1-card-foot {\n  margin-top: 20px;\n  padding-top: 16px;\n  border-top: 1px solid var(--hairline);\n  display: flex; justify-content: space-between; align-items: center;\n  font-size: 12px;\n}\n\n.login-v1-meta { display: flex; flex-direction: column; gap: 12px; }\n.login-v1-meta-card {\n  background: rgba(255,255,255,0.75);\n  backdrop-filter: blur(8px);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n  padding: 14px 16px;\n  font-size: 12.5px;\n  color: var(--ink-2);\n}\n.login-v1-meta-card .eyebrow { margin-bottom: 6px; }\n.login-v1-meta-card p { margin: 4px 0; line-height: 1.5; }\n\n.login-v1-foot {\n  position: relative;\n  z-index: 2;\n  padding: 16px 32px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 10px;\n  font-size: 11.5px;\n  color: rgba(255,255,255,0.78);\n  background: rgba(14,17,22,0.45);\n  backdrop-filter: blur(6px);\n}\n.login-v1-foot-sep { color: rgba(255,255,255,0.35); }\n\n@media (max-width: 840px) {\n  .login-v1-main { grid-template-columns: 1fr; max-width: 460px; }\n  .login-v1-meta { order: 2; }\n}\n\n/* ============================================================\n   V2 — Split screen\n   ============================================================ */\n\n.login-v2 {\n  min-height: 100vh;\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  background: var(--card);\n}\n\n.login-v2-left {\n  position: relative;\n  overflow: hidden;\n  background: #0e1730;\n}\n.login-v2-photo {\n  position: absolute;\n  inset: 0;\n  opacity: 0.7;\n}\n.login-v2-overlay {\n
